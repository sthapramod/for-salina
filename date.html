<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Date With Me</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    font-family:Poppins,Arial,sans-serif;
    background:linear-gradient(135deg,#ffd6e8,#fff0f6);
}

nav{
    background:#ff4f8b;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
}

.logo{
    color:white;
    font-size:24px;
    font-weight:bold;
}

.menu{
    display:flex;
    gap:10px;
}

.menu a{
    text-decoration:none;
    color:white;
    background:#ff69b4;
    padding:10px 15px;
    border-radius:10px;
}

.menu-btn{
    display:none;
    color:white;
    font-size:30px;
    cursor:pointer;
}

.container{
    text-align:center;
    margin-top:60px;
    padding:20px;
}

h1{
    color:#ff1493;
    font-size:42px;
}

#message{
    color:#ff1493;
    font-size:24px;
    margin-bottom:40px;
}

.buttons{
    position:relative;
    height:300px;
}

#yesBtn{
    background:#ff1493;
    color:white;
    border:none;
    padding:18px 40px;
    font-size:22px;
    border-radius:15px;
    cursor:pointer;
    transition:.3s;
}

#noBtn{
    background:#666;
    color:white;
    border:none;
    padding:18px 40px;
    font-size:22px;
    border-radius:15px;
    cursor:pointer;
    position:absolute;
    left:60%;
    top:0;
}

.heart{
    position:fixed;
    bottom:-50px;
    animation:floatUp 4s linear forwards;
    pointer-events:none;
}

@keyframes floatUp{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

@media(max-width:768px){

.menu-btn{
display:block;
}

.menu{
display:none;
position:absolute;
top:65px;
left:0;
width:100%;
background:#ff4f8b;
flex-direction:column;
padding:15px;
}

.menu.show{
display:flex;
}

.menu a{
margin:5px 0;
text-align:center;
}

#noBtn{
left:55%;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">❤️ For Salina ❤️</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">

<a href="home.html">🏠 Home</a>
<a href="letter.html">💌 Letter</a>
<a href="gallery.html">📸 Gallery</a>
<a href="questions.html">💕 Questions</a>
<a href="memories.html">⏳ Memories</a>
<a href="surprise.html">🎁 Surprise</a>
<a href="music.html">🎵 Music</a>
<a href="date.html">💖 Date</a>

</div>

</nav>

<div class="container">

<h1>💖 Will You Go On A Date With Me? 💖</h1>

<p id="message">
🥺 Please choose wisely...
</p>

<div class="buttons">

<button id="yesBtn">YES ❤️</button>

<button id="noBtn">NO 😅</button>

</div>

</div>

<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("show");
}

const messages=[
"🥺 Please don't break my heart...",
"🌹 I'll bring flowers!",
"🍫 I'll buy chocolates!",
"🥹 Pretty please...",
"💕 It'll be fun!",
"❤️ You look cute saying YES!",
"🥰 Come on...",
"😂 Nice try!",
"😍 You can't catch me!",
"💖 Please say YES!"
];

let index=0;
let yesSize=22;

const yes=document.getElementById("yesBtn");
const no=document.getElementById("noBtn");
const message=document.getElementById("message");

function moveNo(){

const x=Math.random()*(window.innerWidth-140);

const y=Math.random()*(window.innerHeight-140);

no.style.position="fixed";
no.style.left=x+"px";
no.style.top=y+"px";

message.innerHTML=messages[index%messages.length];

index++;

yesSize+=6;

yes.style.fontSize=yesSize+"px";

}

no.addEventListener("mouseover",moveNo);
no.addEventListener("click",moveNo);

yes.onclick=function(){

document.body.innerHTML=`
<div style="height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;background:linear-gradient(#ff5ca8,#ffd6e8);text-align:center;">

<h1 style="font-size:60px;color:white;">🎉 YAY!! ❤️</h1>

<h2 style="color:white;">Thank you Salina 💖</h2>

<p style="font-size:24px;color:white;">
I can't wait for our date! 🌹🥰
</p>

</div>
`;

for(let i=0;i<120;i++){

setTimeout(function(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*25)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),4000);

},i*40);

}

}

</script>

</body>
</html>
